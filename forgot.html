<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Forgot Password – Reset your Internal Transitions account password." />
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* Page-specific tweaks that keep your palette */
    .forgot-wrap{
      display:grid;
      place-items:center;
      min-height:100vh;
      min-height:100svh;
      padding: clamp(12px, 3vw, 40px);
    }
    .forgot-card{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: clamp(4px, .5vw, 8px);
      border-left: 3px solid var(--brand-blue);
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 3vw, 36px);
      animation: fadeSlideUp .5s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .1s;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .forgot-card h1{
      font-family: Poppins, Inter, sans-serif;
      color: var(--brand-blue);
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -.2px;
    }
    .forgot-desc{
      color: var(--ink-2);
      font-family: 'Space Mono', monospace;
      font-size: clamp(12px, 2.5vw, 14px);
      margin: 0 0 20px;
      line-height: 1.6;
      letter-spacing: -.3px;
    }
    .notice{
      background: rgba(150, 190, 13, .08);
      border:1px solid rgba(150, 190, 13, .25);
      color: var(--ink);
      padding:12px 14px;
      border-radius:8px;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom:14px;
      display:none; /* JS will show this on submit */
    }
    .notice--error{
      background: rgba(232, 106, 106, .08);
      border-color: rgba(232, 106, 106, .3);
    }
    .actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn-secondary{
      background: var(--bg);
      color: var(--ink);
      border:1px solid var(--stroke);
      height: clamp(38px, 1.6vw + 18px, 46px);
      padding: 0 18px;
      border-radius: 4px;
      font-weight:600;
      font-size: 14px;
      cursor:pointer;
      transition: background .2s, border-color .2s;
    }
    .btn-secondary:hover{ background: var(--stroke); }
    .email-help{
      font-family: 'Space Mono', monospace;
      font-size: clamp(10px, 2.5vw, 11px); color: var(--ink-2); margin-top:8px;
    }

    /* Mobile forgot page */
    @media (max-width: 640px) {
      .forgot-wrap { padding: 12px; }
      .forgot-card { padding: 18px; border-radius: 6px; }
      .actions {
        flex-direction: column;
        gap: 8px;
      }
      .actions .btn-primary {
        width: 100%;
      }
      .actions .btn-secondary {
        width: 100%;
      }
    }
    @media (max-width: 480px) {
      .forgot-card { padding: 14px; }
      .forgot-card h1 { font-size: clamp(18px, 5vw, 24px); }
    }
  </style>
</head>

  <main class="forgot-wrap">
    <section class="forgot-card" role="form" aria-labelledby="forgotTitle">
      <h1 id="forgotTitle">Reset Password</h1>
      <p class="forgot-desc">Enter the email address linked to your account and we'll send you a link to reset your password.</p>

      <div id="info" class="notice" role="status" aria-live="polite"></div>

      <form id="forgotForm" novalidate>
        <label class="label" for="email">Email address</label>
        <div class="field">
          <input id="email" name="email" type="email" placeholder="you@company.co.in" required autocomplete="email"/>
        </div>

        <p class="email-help">Use your company email if you're an internal user.</p>

        <div class="actions">
          <a href="index.html" class="btn-secondary btn-link">Back to Login</a>
          <button type="submit" class="btn-primary">Send Reset Link</button>
        </div>
      </form>
    </section>
  </main>
