      <!-- Right column: Login card -->
      <section class="right">
        <div class="card">
          <h2 class="card-title">Login</h2>
          <p class="card-subtitle">Welcome back! Sign in to continue.</p>

          <form id="loginForm" novalidate>
            <label class="label" for="empId">Employee ID</label>
            <div class="field">
              <input id="empId" name="empId" type="text" placeholder="Employee ID" autocomplete="username" required />
            </div>

            <label class="label" for="password">Password</label>
            <div class="field field--password">
              <input id="password" name="password" type="password" placeholder="**********"
                autocomplete="current-password" required />
              <button type="button" class="btn-eye" aria-label="Show password">
                <!-- eye open icon -->
                <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <!-- eye slash icon (hidden by default) -->
                <svg class="eye-off" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                  <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>

            <div class="row row--between">
              <span></span>
              <a class="link-muted" href="forgot.html" id="forgotLink">Forgot Password?</a>
            </div>

            <button class="btn-primary" type="submit">Login</button>
          </form>
        </div>

    </svg>
